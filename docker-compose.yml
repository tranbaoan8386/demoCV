services:

  postgres:
    image: postgres:16
    container_name: cv_postgres
    environment:
      POSTGRES_DB: cvdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    container_name: cv_minio
    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
      MINIO_DOMAIN: minio

    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    build:
      context: ./backend
    container_name: cv_backend

    env_file:
      - ./backend/.env

    ports:
      - "8000:8000"

    depends_on:
      - postgres
      - minio